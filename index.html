<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자캐 머리/눈 색상 조합표 (최종 완벽판)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f7fa; 
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 상단 조절바 */
        .glass-panel {
            background: #ffffff; border-radius: 15px; padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); margin-bottom: 30px;
            border: 1px solid #e1e4e8; display: flex; flex-wrap: wrap;
            gap: 15px; justify-content: center; align-items: center; z-index: 100;
            width: 100%; max-width: 800px; box-sizing: border-box;
        }

        .control-group {
            display: flex; align-items: center; gap: 8px; background: #f8f9fa;
            padding: 8px 12px; border-radius: 10px; border: 1px solid #eee;
            flex-wrap: wrap; justify-content: center;
        }

        .control-group span { font-weight: 700; color: #555; font-size: 14px; }

        button {
            font-family: inherit; font-size: 13px; font-weight: 700;
            padding: 8px 12px; border: none; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        button:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .btn-shape { background: #fff; color: #333; border: 1px solid #ccc; }
        .btn-add { background: #4a90e2; color: white; }
        .btn-save { background: #2ecc71; color: white; font-size: 15px; padding: 10px 20px; width: 100%; max-width: 200px; }

        .title-color-picker {
            width: 26px; height: 26px; border: 1px solid #ccc;
            border-radius: 5px; cursor: pointer; background: transparent;
        }
        .title-color-picker::-webkit-color-swatch { border: none; border-radius: 4px; }

        /* 메인 레이아웃 (팔레트를 완벽하게 중앙으로) */
        .main-layout { 
            position: relative; /* 메모장을 절대 위치로 띄우기 위한 기준점 */
            display: flex; 
            justify-content: center; /* 팔레트 중앙 정렬 */
            width: 100%; 
            max-width: 1400px; /* 폭을 넓혀서 메모장 공간 확보 */
            margin: 0 auto;
        }

        /* 가이드 메모 (화면 왼쪽으로 완전히 밀착) */
        .guide-memo {
            width: 230px; background: #fff9c4; padding: 20px; border-radius: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05); 
            position: absolute; /* 공중에 띄워서 팔레트 정렬에 영향 안 주게 함 */
            left: 0; /* 왼쪽으로 완전히 밀기 */
            top: 20px;
            transform: rotate(-1deg); border-bottom-right-radius: 30px; line-height: 1.6;
            box-sizing: border-box; z-index: 10;
        }
        .guide-memo h4 { margin: 0 0 10px 0; font-size: 18px; color: #f57f17; }
        .guide-memo ul { margin: 0; padding: 0; list-style: none; font-size: 13px; color: #5d4037; }
        .guide-memo li { margin-bottom: 8px; position: relative; padding-left: 15px; }
        .guide-memo li::before { content: "•"; position: absolute; left: 0; color: #fbc02d; }
        .guide-memo .highlight { font-weight: bold; color: #d84315; }

        /* 모바일 스와이프 안내 문구 */
        .scroll-hint { display: none; color: #4a90e2; font-weight: bold; font-size: 14px; margin-bottom: 10px; animation: pulse 1.5s infinite; text-align: center; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* 표를 감싸는 스크롤 영역 */
        .export-wrapper {
            width: auto; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 15px;
        }

        /* 캡처되는 실제 영역 */
        .export-container {
            background: #ffffff; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex;
            flex-direction: column; align-items: center; border: 1px solid #eaeaea;
            min-width: max-content; 
        }

        .title-container { margin-bottom: 25px; width: 100%; text-align: center; }
        .title-input {
            font-size: 32px; font-weight: 900; color: #333333;
            border: none; outline: none; text-align: center;
            background: transparent; border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 5px; min-width: 300px;
        }
        
        table { border-spacing: 4px; border-collapse: separate; margin: 0 auto; }
        th, td {
            width: 80px; height: 80px; padding: 0; position: relative;
            background-color: #fafbfc; border: 1px solid #e1e4e8; 
            transition: border-radius 0.3s;
        }

        table.shape-square th, table.shape-square td { border-radius: 4px; }
        table.shape-rounded th, table.shape-rounded td { border-radius: 18px; }
        table.shape-circle th, table.shape-circle td { border-radius: 50%; }

        th.color-cell { cursor: pointer; }
        th.color-cell:hover { filter: brightness(1.05); }

        .delete-btn {
            position: absolute; top: -6px; right: -6px; width: 22px; height: 22px;
            background-color: #ff4757; color: white; border-radius: 50%;
            font-size: 10px; font-weight: bold; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 20;
        }
        th:hover .delete-btn { display: flex; }

        .corner-cell {
            background-color: #fff; font-weight: bold; font-size: 13px;
            color: #666; overflow: hidden; border: 1px solid #ccc;
        }
        .corner-cell span { position: absolute; z-index: 2; }
        .corner-hair { top: 10px; right: 12px; }
        .corner-eye { bottom: 10px; left: 12px; }

        .image-cell {
            width: 100%; height: 100%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border-radius: inherit;
        }
        .image-cell:hover { background-color: #f1f3f5; }
        
        /* 🚨 플러스(+) 기호를 띄우는 CSS를 완전히 삭제했습니다. (깨끗한 빈칸 유지) */
        
        .image-cell img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: inherit; }
        .image-cell.has-image img { display: block; }

        .delete-img-btn {
            position: absolute; top: 5px; right: 5px; width: 20px; height: 20px;
            background-color: rgba(255, 71, 87, 0.9); color: white; border-radius: 50%;
            font-size: 10px; font-weight: bold; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 20;
        }
        .image-cell.has-image:hover .delete-img-btn { display: flex; }

        /* 공통 모달 스타일 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; }
        .modal-btns { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .modal-btns button { padding: 10px 20px; font-size: 15px; }
        
        .cropper-container-box { max-height: 50vh; margin-bottom: 15px; }
        .cropper-container-box img { display: block; max-width: 100%; }

        .custom-color-input {
            width: 60px; height: 60px; padding: 0; border: none;
            border-radius: 10px; cursor: pointer; background: transparent;
        }
        .custom-color-input::-webkit-color-swatch-wrapper { padding: 2px; }
        .custom-color-input::-webkit-color-swatch { border: 2px solid #ddd; border-radius: 8px; }
        
        .radio-group {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;
            background: #f1f3f5; padding: 10px; border-radius: 10px; flex-wrap: wrap;
        }
        .radio-group label { cursor: pointer; font-weight: bold; color: #555; display: flex; align-items: center; gap: 5px; }
        
        #color-preview {
            width: 100px; height: 100px; border-radius: 15px;
            margin: 0 auto 10px auto; border: 2px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: background 0.3s;
        }

        /* 📱 화면 폭이 좁아져서 겹칠 것 같으면 메모장을 표 위로 올림 */
        @media (max-width: 1100px) {
            .main-layout { flex-direction: column; align-items: center; }
            .guide-memo { 
                position: relative; left: auto; top: auto; transform: none; 
                margin-bottom: 20px; width: 100%; max-width: 400px; border-radius: 10px; 
            }
        }

        /* 📱 모바일 완전 작은 화면 */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .scroll-hint { display: block; }
            .export-container { padding: 20px 15px; }
            .title-input { font-size: 24px; min-width: 250px; }
            th, td { width: 65px; height: 65px; }
            
            .delete-btn { display: flex; opacity: 0.8; }
            .image-cell.has-image .delete-img-btn { display: flex; opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="control-group">
            <span>모양</span>
            <button class="btn-shape" onclick="changeShape('shape-square')">⬛ 사각</button>
            <button class="btn-shape" onclick="changeShape('shape-rounded')">🟪 둥근사각</button>
            <button class="btn-shape" onclick="changeShape('shape-circle')">🔵 원형</button>
        </div>
        <div class="control-group">
            <span>추가</span>
            <button class="btn-add" onclick="addColumn()">➕ 머리</button>
            <button class="btn-add" onclick="addRow()">➕ 눈</button>
        </div>
        <div class="control-group">
            <span>제목 색</span>
            <input type="color" class="title-color-picker" value="#333333" onchange="document.getElementById('main-title').style.color = this.value">
        </div>
        <button class="btn-save" onclick="saveAsImage()">📸 이미지 저장</button>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <div class="main-layout">
        <div class="guide-memo">
            <h4>📋 사용 가이드</h4>
            <ul>
                <li><span class="highlight">제목 변경:</span> 글씨를 터치해 수정하세요!</li>
                <li><span class="highlight">색상 수정:</span> 색상 칸을 눌러 <b>단색/반반 모드</b>를 고르고 색을 지정할 수 있어요.</li>
                <li><span class="highlight">줄 삭제:</span> <b>[✖]</b> 버튼을 누르면 줄이 지워져요.</li>
                <li><span class="highlight">사진 넣기:</span> 빈칸을 누르고 사진을 <b>정사각형</b>으로 잘라 넣으세요.</li>
                <li><span class="highlight">저장:</span> 하얀 박스 영역(표 전체)이 깔끔하게 저장돼요!</li>
            </ul>
        </div>

        <div class="export-wrapper">
            <div class="scroll-hint">👈 표를 좌우로 밀어서 확인하세요 👉</div>
            
            <div class="export-container" id="export-target">
                <div class="title-container">
                    <div id="main-title" class="title-input" contenteditable="true" spellcheck="false">MY CHARACTER PALETTE</div>
                </div>
                
                <table id="grid" class="shape-rounded"> 
                    <tr id="header-row">
                        <th class="corner-cell">
                            <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: inherit;">
                                <line x1="0" y1="0" x2="100%" y2="100%" stroke="#dcdcdc" stroke-width="1.5"/>
                            </svg>
                            <span class="corner-hair">머리</span>
                            <span class="corner-eye">눈</span>
                        </th>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="color-editor-modal">
        <div class="modal-content">
            <h3>🎨 색상 설정</h3>
            
            <div class="radio-group">
                <label><input type="radio" name="color-mode" value="solid" checked> 🔴 단색</label>
                <label><input type="radio" name="color-mode" value="split"> 🌓 반반(투톤)</label>
            </div>

            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <input type="color" id="picker-color-1" class="custom-color-input" title="첫 번째 색상">
                <input type="color" id="picker-color-2" class="custom-color-input" title="두 번째 색상" style="display:none;">
            </div>

            <p style="margin: 0 0 5px 0; font-size: 13px; color: #888;">미리보기</p>
            <div id="color-preview"></div>

            <div class="modal-btns">
                <button class="btn-save" style="width: auto;" onclick="applyColorSetting()">확인</button>
                <button style="background:#e0e0e0; color:#333; width: auto;" onclick="closeColorEditor()">취소</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="crop-modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">비율 맞추기</h3>
            <div class="cropper-container-box">
                <img id="image-to-crop" src="">
            </div>
            <div class="modal-btns">
                <button class="btn-save" style="width: auto;" onclick="applyCrop()">확인</button>
                <button style="background:#e0e0e0; color:#333; width: auto;" onclick="closeCropModal()">취소</button>
            </div>
        </div>
    </div>

    <script>
        const table = document.getElementById('grid');
        const headerRow = document.getElementById('header-row');
        const fileInput = document.getElementById('file-input');
        
        const colorEditorModal = document.getElementById('color-editor-modal');
        const cropModal = document.getElementById('crop-modal');
        const imageToCrop = document.getElementById('image-to-crop');
        const mainTitle = document.getElementById('main-title');
        
        const modeRadios = document.querySelectorAll('input[name="color-mode"]');
        const picker1 = document.getElementById('picker-color-1');
        const picker2 = document.getElementById('picker-color-2');
        const colorPreview = document.getElementById('color-preview');
        
        let cropper = null;
        let activeCell = null; 
        let activeColorTh = null; 

        const baseColors = ['#FF9A9E', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#FFFFFF', '#4A4A4A'];

        function changeShape(shapeClass) { table.className = shapeClass; }
        function getRandomColor() { return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'); }

        function createTd() {
            let td = document.createElement('td');
            td.innerHTML = `<div class="image-cell"><img><div class="delete-img-btn" title="사진 지우기">✖</div></div>`;
            const imageCell = td.querySelector('.image-cell');
            const deleteBtn = td.querySelector('.delete-img-btn');

            imageCell.addEventListener('click', function(e) {
                if (e.target === deleteBtn) return;
                activeCell = this; fileInput.value = ''; fileInput.click();
            });
            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation(); imageCell.classList.remove('has-image');
                imageCell.querySelector('img').src = '';
            });
            return td;
        }

        function createColorTh(color, isColHeader) {
            let th = document.createElement('th');
            th.className = 'color-cell';
            th.style.background = color;
            th.dataset.color1 = color;
            th.dataset.color2 = color;
            th.dataset.mode = 'solid';
            
            th.innerHTML = `<div class="delete-btn" onclick="deleteLine(this, ${isColHeader})" title="줄 삭제">✖</div>`;
            
            th.addEventListener('click', function(e) {
                if (e.target.classList.contains('delete-btn')) return;
                openColorEditor(this);
            });
            return th;
        }

        function updatePreview() {
            const mode = document.querySelector('input[name="color-mode"]:checked').value;
            const c1 = picker1.value;
            const c2 = picker2.value;

            if (mode === 'solid') {
                picker2.style.display = 'none';
                colorPreview.style.background = c1;
            } else {
                picker2.style.display = 'inline-block';
                colorPreview.style.background = `linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
            }
        }

        modeRadios.forEach(radio => radio.addEventListener('change', updatePreview));
        picker1.addEventListener('input', updatePreview);
        picker2.addEventListener('input', updatePreview);

        function openColorEditor(th) {
            activeColorTh = th;
            const mode = th.dataset.mode || 'solid';
            const c1 = th.dataset.color1 || '#ffffff';
            const c2 = th.dataset.color2 || '#ffffff';

            document.querySelector(`input[name="color-mode"][value="${mode}"]`).checked = true;
            picker1.value = c1;
            picker2.value = c2;
            
            updatePreview();
            colorEditorModal.style.display = 'flex';
        }

        function applyColorSetting() {
            const mode = document.querySelector('input[name="color-mode"]:checked').value;
            const c1 = picker1.value;
            const c2 = picker2.value;

            activeColorTh.dataset.mode = mode;
            activeColorTh.dataset.color1 = c1;
            
            if (mode === 'solid') {
                activeColorTh.dataset.color2 = c1;
                activeColorTh.style.background = c1;
            } else {
                activeColorTh.dataset.color2 = c2;
                activeColorTh.style.background = `linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
            }
            closeColorEditor();
        }

        function closeColorEditor() { colorEditorModal.style.display = 'none'; }

        function deleteLine(btnElement, isColHeader) {
            const th = btnElement.parentElement;
            if (isColHeader) {
                const colIndex = th.cellIndex;
                const rows = table.rows;
                for (let i = 0; i < rows.length; i++) if (rows[i].cells[colIndex]) rows[i].deleteCell(colIndex);
            } else {
                th.parentElement.remove();
            }
        }

        function addColumn() {
            headerRow.appendChild(createColorTh(getRandomColor(), true));
            const rows = table.querySelectorAll('tr');
            for (let i = 1; i < rows.length; i++) rows[i].appendChild(createTd());
        }

        function addRow() {
            let tr = document.createElement('tr');
            tr.appendChild(createColorTh(getRandomColor(), false));
            const currentColCount = headerRow.cells.length - 1;
            for (let i = 0; i < currentColCount; i++) tr.appendChild(createTd());
            table.appendChild(tr);
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imageToCrop.src = event.target.result;
                    cropModal.style.display = 'flex';
                    if (cropper) cropper.destroy();
                    // 모바일 최적화를 위해 viewMode와 배경 설정 추가
                    cropper = new Cropper(imageToCrop, { 
                        aspectRatio: 1, 
                        viewMode: 1, 
                        dragMode: 'move',
                        background: false
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        function applyCrop() {
            if (!cropper || !activeCell) return;
            const croppedCanvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
            const imgTag = activeCell.querySelector('img');
            imgTag.src = croppedCanvas.toDataURL('image/jpeg');
            activeCell.classList.add('has-image');
            closeCropModal();
        }

        function closeCropModal() { cropModal.style.display = 'none'; if (cropper) cropper.destroy(); }

        function saveAsImage() {
            const target = document.getElementById('export-target');
            const btn = document.querySelector('.btn-save');
            const originalText = btn.innerText;
            btn.innerText = "저장 중...";

            // 캡처 전 불필요한 요소 숨김 (삭제 버튼 등)
            const deleteBtns = document.querySelectorAll('.delete-btn, .delete-img-btn');
            deleteBtns.forEach(btn => btn.style.display = 'none');
            mainTitle.style.borderBottom = "none";

            // 스크롤 초기화 (잘림 방지)
            const wrapper = document.querySelector('.export-wrapper');
            const wrapperScrollLeft = wrapper.scrollLeft; // 현재 스크롤 위치 기억
            wrapper.scrollLeft = 0; 
            window.scrollTo(0, 0);

            html2canvas(target, { 
                scale: 2, 
                backgroundColor: "#ffffff", 
                useCORS: true, 
                logging: false,
                // 모바일 환경에서의 캡처 호환성 옵션
                windowWidth: target.scrollWidth,
                windowHeight: target.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_Character_Palette.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 원상 복구
                btn.innerText = originalText;
                mainTitle.style.borderBottom = "2px dashed #cbd5e1";
                // 모바일에서는 호버가 없으므로 다시 보이게 해줍니다.
                deleteBtns.forEach(btn => btn.style.display = '');
                wrapper.scrollLeft = wrapperScrollLeft; // 스크롤 원래 위치로
            });
        }

        window.onload = () => {
            baseColors.forEach(color => headerRow.appendChild(createColorTh(color, true)));
            baseColors.forEach(rowColor => {
                let tr = document.createElement('tr');
                tr.appendChild(createColorTh(rowColor, false));
                for (let i = 0; i < baseColors.length; i++) tr.appendChild(createTd());
                table.appendChild(tr);
            });
        };
    </script>
